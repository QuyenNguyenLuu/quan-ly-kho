<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coco Cottage · Quản lý kho</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --side:#20353a;--side-2:#182a2e;--side-line:#33484c;
    --side-ink:#e4ecec;--side-muted:#93a4a4;--side-sec:#a7b6b6;
    --bg:#f3f1ea;--panel:#ffffff;--line:#e3ddd0;--line-soft:#efeae0;
    --ink:#3a4a48;--ink-strong:#243b3d;--label:#8a8577;--muted:#9b9587;
    --accent:#2f5d54;--accent-dark:#244a43;--accent-soft:#e5ede9;
    --warn:#b98a2e;--warn-soft:#f6edd8;--danger:#b5544a;--danger-soft:#f6e4e1;
    --radius:4px;--serif:'Playfair Display',Georgia,serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--ink);line-height:1.55;-webkit-font-smoothing:antialiased}
  button{font-family:inherit;cursor:pointer;border:none;color:inherit}
  input,select{font-family:inherit;font-size:14px;color:var(--ink)}
  ::selection{background:var(--accent);color:#fff}

  .app{display:flex;min-height:100vh}
  aside{width:240px;background:var(--side);position:fixed;height:100vh;display:flex;flex-direction:column;overflow:hidden;z-index:20}
  .brand{padding:18px 18px;border-bottom:1px solid var(--side-line);display:flex;align-items:center;gap:11px}
  .bmark{display:inline-flex;align-items:center;justify-content:center;border-radius:8px;background:transparent;flex:none;overflow:hidden}
  .brand .bn{font-family:var(--serif);font-weight:600;font-size:18px;color:#fff;letter-spacing:.3px;line-height:1.1}
  .brand .bs{font-size:10px;color:var(--side-muted);letter-spacing:1.5px;text-transform:uppercase}
  .profile{padding:20px 18px;border-bottom:1px solid var(--side-line);display:flex;align-items:center;gap:13px}
  .avatar{width:46px;height:46px;border-radius:6px;background:#2f5d54;display:flex;align-items:center;justify-content:center;font-weight:600;color:#fff;font-size:17px;flex:none}
  .profile .pw{font-size:11px;color:var(--side-muted)}
  .profile .pn{font-size:14.5px;color:#fff;font-weight:600}
  nav{padding:14px 0;flex:1;overflow-y:auto}
  .nav-sec{font-size:11px;text-transform:uppercase;letter-spacing:1.4px;color:var(--side-sec);padding:16px 20px 8px;font-weight:700}
  .nav-btn{display:flex;align-items:center;width:100%;text-align:left;background:none;color:var(--side-ink);padding:12px 22px;font-size:14px;font-weight:500;transition:.13s;border-left:3px solid transparent}
  .nav-btn:hover{background:rgba(255,255,255,.05)}
  .nav-btn.on{background:var(--side-2);border-left-color:#7fb8a8;color:#fff;font-weight:600}

  main{margin-left:240px;flex:1;min-height:100vh;display:flex;flex-direction:column}
  .topbar{height:60px;background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:sticky;top:0;z-index:15}
  .topbar .crumb{font-family:var(--serif);font-size:16px;color:var(--ink-strong)}
  .topbar .uchip{display:flex;align-items:center;gap:10px;font-size:13.5px;color:var(--ink)}
  .topbar .uchip .av{width:32px;height:32px;border-radius:5px;background:#2f5d54;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:600;font-size:13px}
  .topbar .logout{margin-left:8px;font-size:12px;color:var(--muted);background:none;padding:6px 13px;border:1px solid var(--line);border-radius:20px}
  .topbar .logout:hover{color:var(--danger);border-color:var(--danger)}

  .content{position:relative;flex:1;padding:26px 28px 60px;overflow:hidden}
  .pagehead{margin-bottom:22px}
  .pagehead h2{font-family:var(--serif);font-size:26px;font-weight:600;color:var(--ink-strong);letter-spacing:.2px}
  .pagehead .sub{color:var(--muted);font-size:13px;margin-top:4px}

  .btn{padding:9px 18px;border-radius:22px;font-size:13px;font-weight:600;display:inline-flex;align-items:center;gap:7px;transition:.14s;letter-spacing:.4px}
  .btn-primary{background:var(--accent);color:#fff}
  .btn-primary:hover{background:var(--accent-dark)}
  .btn-ghost{background:transparent;color:var(--ink);border:1px solid var(--line)}
  .btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
  .btn-sm{padding:5px 13px;font-size:12px;font-weight:600;border-radius:20px;background:transparent;border:1px solid var(--line);color:var(--ink)}
  .btn-sm:hover{border-color:var(--accent);color:var(--accent)}
  .btn-sm.danger:hover{border-color:var(--danger);color:var(--danger)}

  .kpis{display:flex;flex-wrap:wrap;background:#fff;border:1px solid var(--line);border-radius:var(--radius);margin-bottom:24px}
  .kpi{flex:1;min-width:160px;padding:18px 22px;border-left:1px solid var(--line)}
  .kpi:first-child{border-left:none}
  .kpi .k{font-size:13px;color:var(--muted);font-weight:500}
  .kpi .v{font-family:var(--serif);font-size:32px;font-weight:600;color:var(--ink-strong);line-height:1.2;margin-top:4px;font-variant-numeric:tabular-nums}
  .kpi .v.accent{color:var(--accent)}.kpi .v.danger{color:var(--danger)}.kpi .v.warn{color:var(--warn)}
  .kpi .d{font-size:12px;margin-top:3px;color:var(--muted)}

  .panel{background:#fff;border:1px solid var(--line);border-radius:var(--radius);margin-bottom:22px}
  .panel-head{padding:15px 20px;border-bottom:1px solid var(--line-soft);display:flex;justify-content:space-between;align-items:center;gap:14px;flex-wrap:wrap}
  .panel-head h3{font-family:var(--serif);font-size:17px;font-weight:600;color:var(--ink-strong)}
  table{width:100%;border-collapse:collapse}
  th{text-align:left;font-size:12px;text-transform:uppercase;letter-spacing:.4px;color:var(--label);font-weight:600;padding:12px 20px;border-bottom:1px solid var(--line)}
  td{padding:13px 20px;border-bottom:1px solid var(--line-soft);font-size:14px;color:var(--ink)}
  tr:last-child td{border-bottom:none}
  tbody tr:hover td{background:#faf8f2}
  td b,td .strong{color:var(--ink-strong);font-weight:600}
  .num{text-align:right;font-variant-numeric:tabular-nums}
  tfoot td{padding:13px 20px;border-top:2px solid var(--line);font-size:14px;background:#faf8f2}

  .tag{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600}
  .tag-in{background:var(--accent-soft);color:var(--accent-dark)}
  .tag-out{background:var(--danger-soft);color:var(--danger)}
  .tag-warn{background:var(--warn-soft);color:#96701f}
  .tag-accent{background:var(--accent-soft);color:var(--accent-dark)}
  .tag-muted{background:#efeae0;color:var(--muted)}
  .qty-low{color:var(--danger);font-weight:700}
  .empty{padding:46px;text-align:center;color:var(--muted);font-size:14px}
  .actions{display:flex;gap:8px;justify-content:flex-end}

  .prog{height:7px;background:#eae4d8;border-radius:20px;overflow:hidden;min-width:120px}
  .prog > i{display:block;height:100%;background:var(--accent);border-radius:20px}

  .rtabs{display:flex;gap:8px;margin-bottom:20px;border-bottom:1px solid var(--line);flex-wrap:wrap}
  .rtab{padding:10px 18px;font-size:14px;font-weight:600;color:var(--muted);background:none;border:none;border-bottom:2px solid transparent;margin-bottom:-1px;transition:.13s;font-family:var(--serif)}
  .rtab:hover{color:var(--ink)}
  .rtab.on{color:var(--accent-dark);border-bottom-color:var(--accent)}

  .stock-hero{display:flex;flex-wrap:wrap;gap:24px;justify-content:space-between;align-items:center;background:var(--side);color:#fff;border-radius:8px;padding:26px 30px;margin-bottom:24px}
  .sh-main .sh-label{font-size:13px;letter-spacing:1px;text-transform:uppercase;color:#9db0ad;font-weight:600}
  .sh-main .sh-value{font-family:var(--serif);font-size:46px;font-weight:600;line-height:1.1;margin:6px 0 4px;color:#fff}
  .sh-main .sh-value span{font-family:'Inter',sans-serif;font-size:16px;font-weight:400;color:#9db0ad;margin-left:4px}
  .sh-main .sh-sub{font-size:13.5px;color:#b6c4c2}
  .sh-side{display:flex;align-items:center;gap:26px;flex-wrap:wrap}
  .sh-stat{text-align:center}
  .sh-stat .n{font-family:var(--serif);font-size:28px;font-weight:600;color:#fff}
  .sh-stat .n.warn{color:#e0b869}.sh-stat .n.danger{color:#e09a8f}
  .sh-stat .t{font-size:12px;color:#9db0ad;margin-top:2px}
  .sh-link{background:rgba(255,255,255,.1);color:#fff;font-size:13px;font-weight:600;padding:10px 16px;border-radius:22px;transition:.13s;white-space:nowrap}
  .sh-link:hover{background:rgba(255,255,255,.2)}

  /* phiếu nhập/xuất nhiều dòng */
  .voucher-lines{width:100%}
  .voucher-lines th{padding:10px 12px}
  .voucher-lines td{padding:8px 12px;border-bottom:1px solid var(--line-soft)}
  .voucher-lines select,.voucher-lines input{width:100%;padding:8px 10px;border:1px solid var(--line);border-radius:var(--radius);background:#fff}
  .voucher-lines .rm{background:none;border:1px solid var(--line);border-radius:20px;padding:4px 11px;font-size:12px;color:var(--muted)}
  .voucher-lines .rm:hover{border-color:var(--danger);color:var(--danger)}
  .line-name{font-size:13px;color:var(--muted)}
  .addline{margin:12px 0 0}

  .form-grid{display:grid;gap:16px;grid-template-columns:repeat(auto-fit,minmax(200px,1fr))}
  .field label{display:block;font-size:12px;font-weight:600;color:var(--label);margin-bottom:6px}
  .field input,.field select{width:100%;padding:9px 12px;border:1px solid var(--line);border-radius:var(--radius);background:#fff;transition:.13s}
  .field input::placeholder{color:#bdb6a5}
  .field input:focus,.field select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  .filter-bar{display:flex;gap:15px;align-items:flex-end;flex-wrap:wrap}
  .filter-bar .field{min-width:150px}
  .search{padding:9px 12px;border:1px solid var(--line);border-radius:var(--radius);background:#fff;min-width:230px}
  .search:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}

  .overlay{position:fixed;inset:0;background:rgba(42,58,77,.45);display:none;align-items:center;justify-content:center;z-index:60;padding:20px}
  .overlay.show{display:flex}
  .modal{background:#fff;border-radius:6px;width:100%;max-width:480px;box-shadow:0 24px 60px rgba(0,0,0,.25);overflow:hidden}
  .modal-head{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
  .modal-head h3{font-family:var(--serif);font-size:17px;font-weight:600;color:var(--ink-strong)}
  .modal-head .x{background:none;font-size:24px;color:var(--muted);line-height:.6;padding:0 4px}
  .modal-head .x:hover{color:var(--ink)}
  .modal-body{padding:22px;display:grid;gap:16px}
  .modal-foot{padding:16px 22px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:11px}

  .toast{position:fixed;bottom:26px;right:26px;background:var(--side);color:#fff;padding:13px 20px;border-radius:var(--radius);font-size:13.5px;font-weight:600;box-shadow:0 12px 36px rgba(0,0,0,.3);transform:translateY(90px);opacity:0;transition:.3s;z-index:90}
  .toast.show{transform:translateY(0);opacity:1}

  .gate{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:var(--side);position:relative;overflow:hidden}
  .gate-card{position:relative;z-index:1;background:#fff;border-radius:8px;padding:38px 36px;max-width:392px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.3)}
  .gate-logo{display:flex;justify-content:center;margin-bottom:18px}
  .gate-logo .bmark{background:#20353a}
  .gate-title{text-align:center;font-family:var(--serif);font-size:18px;font-weight:600;color:var(--ink-strong);margin-bottom:24px;letter-spacing:.3px}
  .loading{padding:80px;text-align:center;color:var(--muted)}

  .site-footer{background:var(--side);color:var(--side-ink);padding:56px 40px 30px;margin-top:auto}
  .foot-grid{display:grid;grid-template-columns:1.4fr 1.4fr 1fr .8fr;gap:40px;max-width:1200px;margin:0 auto}
  .foot-brand .bmark{background:transparent;border-radius:0;margin-bottom:22px}
  .foot-tag{font-family:var(--serif);font-size:16px;line-height:1.6;color:#c9d4d2;max-width:340px}
  .foot-col h4{font-family:var(--serif);font-size:24px;color:#fff;margin-bottom:22px;font-weight:500}
  .foot-col p{font-size:14.5px;line-height:1.7;color:#c2cfcd;margin-bottom:14px}
  .foot-col .foot-lbl{color:#8ea09d;font-size:13px;margin-bottom:2px;margin-top:6px}
  .foot-col a{display:block;font-size:14.5px;color:#c2cfcd;margin-bottom:16px;text-decoration:none;cursor:pointer;transition:.13s}
  .foot-col a:hover{color:#fff}
  .foot-base{max-width:1200px;margin:44px auto 0;padding-top:22px;border-top:1px solid var(--side-line);font-size:12.5px;color:#8ea09d;text-align:center;letter-spacing:.3px}
  @media(max-width:880px){
    aside{position:relative;width:100%;height:auto}
    .app{flex-direction:column}
    main{margin-left:0}
    nav{display:grid;grid-template-columns:repeat(2,1fr)}
    .nav-sec{grid-column:1/-1}
    .content{padding:20px 16px}
    .foot-grid{grid-template-columns:1fr 1fr}
  }
</style>
</head>

/* ====== hash mật khẩu ====== */
async function hashPw(pw){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(pw));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

/* ====== storage + migration ====== */
async function load(){
  let raw=null;
  try{ raw=localStorage.getItem('inv-db-v2'); }catch(e){}
  if(raw){ DB=JSON.parse(raw); return; }
  // di trú từ bản cũ (inv-db) nếu có
  let old=null;
  try{ old=JSON.parse(localStorage.getItem('inv-db')||'null'); }catch(e){}
  if(old){
    DB.users=old.users||[];
    DB.goods=(old.goods||[]).map(g=>({id:g.id,code:g.code,name:g.name,unit:g.unit||'cái',qty:g.qty||0,minQty:g.minQty??10}));
    DB.suppliers=[{id:uid(),code:'NCC001',name:'Nhà cung cấp chung'}];
    // phòng ban tiêu thụ cũ → đối tượng sử dụng
    DB.targets=(old.depts||[]).filter(d=>d.type!=='kho').map(d=>({id:d.id,code:'DT'+d.id.slice(-4).toUpperCase(),name:d.name}));
    if(!DB.targets.length) DB.targets=[{id:uid(),code:'DT001',name:'Nhà hàng'},{id:uid(),code:'DT002',name:'Phòng ngủ'}];
    // giao dịch cũ → phiếu 1 dòng
    DB.vouchers=(old.txns||[]).map(t=>({
      id:t.id,type:t.type,date:t.date,note:t.note||'',
      partnerId: t.type==='in' ? DB.suppliers[0].id : (DB.targets.find(x=>x.id===t.deptId)?.id||DB.targets[0].id),
      lines:[{goodId:t.goodId,qty:t.qty}]
    }));
    await save(); return;
  }
  // seed mới

/* ====== helpers ====== */
function good(id){ return DB.goods.find(x=>x.id===id); }
function supplier(id){ return DB.suppliers.find(x=>x.id===id); }
function target(id){ return DB.targets.find(x=>x.id===id); }
function partnerName(v){ const p=v.type==='in'?supplier(v.partnerId):target(v.partnerId); return p?`${p.code} — ${p.name}`:'—'; }
function fmt(n){ return new Intl.NumberFormat('vi-VN').format(n); }
function today(){ return new Date().toISOString().slice(0,10); }
function fmtDate(d){ const [y,m,dd]=d.split('-'); return `${dd}/${m}/${y}`; }
function toast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2600); }
const esc=s=>String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function val(id){ return document.getElementById(id).value.trim(); }
function initials(name){ return name.trim().split(/\s+/).slice(-2).map(w=>w[0]).join('').toUpperCase(); }
function isLow(g){ return g.qty<= (g.minQty??0); }
function csvDownload(name,csv){ const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'}),a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=name; a.click(); toast('Đã xuất CSV'); }

let ioMode='in';           // 'in' | 'out'
let voucherLines=[];       // [{goodId, qty}]
function vInout(v){
  v.innerHTML=`
  <div class="pagehead"><h2>Nhập / Xuất kho</h2><div class="sub">Lập phiếu nhập kho từ nhà cung cấp, phiếu xuất kho cho đối tượng sử dụng</div></div>

  <div id="io-body"></div>`;
  renderIoBody();
}
function setIoMode(m){ ioMode=m; voucherLines=[{goodId:'',qty:1}]; vInout(document.getElementById('view')); }
function renderIoBody(){
  if(!voucherLines.length) voucherLines=[{goodId:'',qty:1}];
  const isIn=ioMode==='in';
  const partners=isIn?DB.suppliers:DB.targets;
  const b=document.getElementById('io-body');
  b.innerHTML=`
  <div class="panel"><div class="panel-head"><h3>${isIn?'Phiếu nhập kho':'Phiếu xuất kho'}</h3></div>
    <div style="padding:22px">
      <div class="form-grid" style="max-width:640px">
        <div class="field"><label>${isIn?'Nhà cung cấp':'Đối tượng sử dụng'} (gõ mã hoặc chọn)</label>
          <input id="vc-partner" list="partner-list" placeholder="${isIn?'VD: NCC001':'VD: DT001'}">
          <datalist id="partner-list">${partners.map(p=>`<option value="${esc(p.code)}">${esc(p.name)}</option>`).join('')}</datalist>
        </div>
        <div class="field"><label>Ngày tháng năm</label><input id="vc-date" type="date" value="${today()}"></div>
      </div>
      <div style="margin-top:20px;overflow-x:auto">
        <table class="voucher-lines"><thead><tr><th style="width:32%">Mã hàng</th><th>Tên hàng</th><th style="width:120px" class="num">Số lượng</th><th style="width:70px"></th></tr></thead>
        <tbody id="vc-lines"></tbody></table>
        <button class="btn btn-ghost addline" onclick="addLine()">+ Thêm dòng</button>
      </div>
      <div style="margin-top:22px;border-top:1px solid var(--line-soft);padding-top:18px">
        <button class="btn btn-primary" onclick="saveVoucher()">${isIn?'Lưu Phiếu Nhập':'Lưu Phiếu Xuất'}</button>
      </div>
    </div>
  </div>
  <div class="panel"><div class="panel-head"><h3>Phiếu ${isIn?'nhập':'xuất'} gần đây</h3></div>
    ${renderVoucherHistory(isIn?'in':'out')}
  </div>`;
  renderLines();
}
function renderLines(){
  const tb=document.getElementById('vc-lines');
  tb.innerHTML=voucherLines.map((ln,i)=>{
    const g=good(ln.goodId);
    return `<tr>
      <td><select onchange="lineGood(${i},this.value)"><option value="">— Chọn mã hàng —</option>${DB.goods.map(x=>`<option value="${x.id}" ${x.id===ln.goodId?'selected':''}>${esc(x.code)}</option>`).join('')}</select></td>
      <td class="line-name">${g?esc(g.name)+' <span style="color:var(--label)">('+fmt(g.qty)+' '+esc(g.unit||'')+' tồn)</span>':'—'}</td>
      <td><input type="number" min="1" value="${ln.qty}" onchange="lineQty(${i},this.value)"></td>
      <td style="text-align:right">${voucherLines.length>1?`<button class="rm" onclick="rmLine(${i})">Xoá</button>`:''}</td>
    </tr>`;
  }).join('');
}
function addLine(){ voucherLines.push({goodId:'',qty:1}); renderLines(); }
function rmLine(i){ voucherLines.splice(i,1); renderLines(); }
function lineGood(i,v){ voucherLines[i].goodId=v; renderLines(); }
function lineQty(i,v){ voucherLines[i].qty=Math.max(1,parseInt(v,10)||1); }
function renderVoucherHistory(type){
  const list=DB.vouchers.filter(v=>v.type===type).sort((a,b)=>b.date.localeCompare(a.date)||b.id.localeCompare(a.id)).slice(0,10);
  if(!list.length) return `<div class="empty">Chưa có phiếu.</div>`;
  return `<table><thead><tr><th>Ngày</th><th>${type==='in'?'Nhà cung cấp':'Đối tượng'}</th><th>Chi tiết</th><th class="num">Tổng SL</th>${isAdmin()?'<th class="num"></th>':''}</tr></thead>
  <tbody>${list.map(vc=>`<tr><td>${fmtDate(vc.date)}</td><td>${esc(partnerName(vc))}</td>
    <td style="font-size:13px;color:var(--muted)">${vc.lines.map(l=>{const g=good(l.goodId);return g?esc(g.code)+' × '+fmt(l.qty):'';}).filter(Boolean).join(', ')}</td>
    <td class="num strong">${fmt(vc.lines.reduce((s,l)=>s+l.qty,0))}</td>
    ${isAdmin()?`<td class="num"><button class="btn-sm danger" onclick="delVoucher('${vc.id}')">Xoá</button></td>`:''}</tr>`).join('')}</tbody></table>`;
}
async function saveVoucher(){
  const isIn=ioMode==='in';
  const partners=isIn?DB.suppliers:DB.targets;
  const codeInput=val('vc-partner').toLowerCase();
  const partner=partners.find(p=>p.code.toLowerCase()===codeInput||p.name.toLowerCase()===codeInput);
  if(!partner){ toast(isIn?'Chọn hoặc gõ đúng mã nhà cung cấp':'Chọn hoặc gõ đúng mã đối tượng sử dụng'); return; }
  const date=val('vc-date');
  if(!date){ toast('Chọn ngày'); return; }
  const lines=voucherLines.filter(l=>l.goodId&&l.qty>0);
  if(!lines.length){ toast('Thêm ít nhất 1 dòng hàng hoá'); return; }
  // gộp dòng trùng mã
  const merged={};
  lines.forEach(l=>{ merged[l.goodId]=(merged[l.goodId]||0)+l.qty; });
  const finalLines=Object.entries(merged).map(([goodId,qty])=>({goodId,qty}));
  // kiểm tra tồn khi xuất
  if(!isIn){
    for(const l of finalLines){
      const g=good(l.goodId);
      if(l.qty>g.qty){ toast(`Mã hàng ${g.code} không đủ để xuất kho (tồn ${fmt(g.qty)})`); return; }
    }
  }
  // cập nhật tồn
  finalLines.forEach(l=>{ const g=good(l.goodId); g.qty+=isIn?l.qty:-l.qty; });
  DB.vouchers.push({id:uid(),type:isIn?'in':'out',partnerId:partner.id,date,lines:finalLines});
  await save();
  toast(isIn?'Đã lưu phiếu nhập':'Đã lưu phiếu xuất');
  voucherLines=[{goodId:'',qty:1}];
  renderIoBody();
}
async function delVoucher(id){
  if(!isAdmin()){ toast('Chỉ quản trị viên mới thao tác được'); return; }
  if(!confirm('Xoá phiếu này? Tồn kho sẽ được hoàn lại.'))return;
  const vc=DB.vouchers.find(x=>x.id===id); if(!vc)return;
  vc.lines.forEach(l=>{ const g=good(l.goodId); if(g) g.qty+=vc.type==='in'?-l.qty:l.qty; });
  DB.vouchers=DB.vouchers.filter(x=>x.id!==id);
  await save(); toast('Đã xoá phiếu'); renderIoBody();
}

function monthStart(){ return today().slice(0,7)+'-01'; }
function renderReportBody(){

      <div class="field"><label>Mã hàng</label><select id="rp-good"><option value="">Tất cả</option>${DB.goods.map(g=>`<option value="${g.id}">${esc(g.code)} — ${esc(g.name)}</option>`).join('')}</select></div>
      ${partnerFilter}
      <button class="btn btn-primary" onclick="runReport()">Xem báo cáo</button>
      <button class="btn btn-ghost" onclick="exportReportCSV()">Xuất CSV</button>
    </div>
  </div>
  <div id="rp-result"></div>`;
  runReport();
}
let lastReport={rows:[],cols:[],name:''};
function runReport(){
  if(reportMode==='in'||reportMode==='out') runFlowDetailReport();
  else runNXTReport();
}
/* Báo cáo nhập / xuất: liệt kê chi tiết dòng phiếu */
function runFlowDetailReport(){
  const from=val('rp-from'),to=val('rp-to');
  const goodF=document.getElementById('rp-good').value;
  const partnerF=document.getElementById('rp-partner')?.value||'';
  const type=reportMode;
  const rows=[];
  DB.vouchers.filter(vc=>vc.type===type&&vc.date>=from&&vc.date<=to&&(!partnerF||vc.partnerId===partnerF)).forEach(vc=>{
    vc.lines.forEach(l=>{
      if(goodF&&l.goodId!==goodF) return;
      const g=good(l.goodId); if(!g) return;
      rows.push({date:vc.date,partner:partnerName(vc),code:g.code,name:g.name,unit:g.unit||'',qty:l.qty});
    });
  });
  rows.sort((a,b)=>a.date.localeCompare(b.date)||a.code.localeCompare(b.code));
  const total=rows.reduce((s,r)=>s+r.qty,0);
  const pLabel=type==='in'?'Nhà cung cấp':'Đối tượng';
  lastReport={name:type==='in'?'bao-cao-nhap':'bao-cao-xuat',
    cols:['Ngay',pLabel,'Ma','Ten hang','Don vi','So luong'],
    rows:rows.map(r=>[r.date,r.partner,r.code,r.name,r.unit,r.qty])};
  document.getElementById('rp-result').innerHTML=`
  <div class="kpis">
    <div class="kpi"><div class="k">Số dòng</div><div class="v">${rows.length}</div></div>
    <div class="kpi"><div class="k">Tổng số lượng ${type==='in'?'nhập':'xuất'}</div><div class="v ${type==='in'?'accent':'danger'}">${fmt(total)}</div></div>
  </div>
  <div class="panel"><div class="panel-head"><h3>Báo cáo ${type==='in'?'nhập':'xuất'} · ${fmtDate(from)} – ${fmtDate(to)}</h3></div>
  <table><thead><tr><th>Ngày</th><th>${pLabel}</th><th>Mã</th><th>Tên hàng</th><th>Đơn vị</th><th class="num">Số lượng</th></tr></thead>
  <tbody>${rows.length?rows.map(r=>`<tr><td>${fmtDate(r.date)}</td><td>${esc(r.partner)}</td><td><b>${esc(r.code)}</b></td><td>${esc(r.name)}</td><td>${esc(r.unit)}</td><td class="num strong">${fmt(r.qty)}</td></tr>`).join(''):`<tr><td colspan="6" class="empty">Không có dữ liệu trong kỳ.</td></tr>`}</tbody>
  ${rows.length?`<tfoot><tr><td colspan="5" class="strong">Tổng cộng</td><td class="num strong">${fmt(total)}</td></tr></tfoot>`:''}</table></div>`;
}
/* Nhập Xuất Tồn: theo mặt hàng */
function runNXTReport(){
  const from=val('rp-from'),to=val('rp-to');
  const goodF=document.getElementById('rp-good').value;
  const goodsList=goodF?DB.goods.filter(g=>g.id===goodF):DB.goods;
  const rows=goodsList.map(g=>{
    let inBefore=0,outBefore=0,inP=0,outP=0;
    DB.vouchers.forEach(vc=>{
      vc.lines.forEach(l=>{
        if(l.goodId!==g.id) return;
        if(vc.date<from){ if(vc.type==='in') inBefore+=l.qty; else outBefore+=l.qty; }
        else if(vc.date<=to){ if(vc.type==='in') inP+=l.qty; else outP+=l.qty; }
      });
    });
    // tồn đầu kỳ = tồn hiện tại − (mọi biến động từ 'from' trở đi)
    let netAfterFrom=0;
    DB.vouchers.forEach(vc=>{ vc.lines.forEach(l=>{ if(l.goodId===g.id&&vc.date>=from) netAfterFrom+=(vc.type==='in'?l.qty:-l.qty); }); });
    const opening=g.qty-netAfterFrom;
    const closing=opening+inP-outP;
    return {code:g.code,name:g.name,unit:g.unit||'',opening,inP,outP,closing};
  });
  const tIn=rows.reduce((s,r)=>s+r.inP,0),tOut=rows.reduce((s,r)=>s+r.outP,0),tClose=rows.reduce((s,r)=>s+r.closing,0);
  lastReport={name:'nhap-xuat-ton',cols:['Ma','Ten hang','Don vi','Ton dau','Nhap','Xuat','Ton cuoi'],
    rows:rows.map(r=>[r.code,r.name,r.unit,r.opening,r.inP,r.outP,r.closing])};
  document.getElementById('rp-result').innerHTML=`
  <div class="kpis">
    <div class="kpi"><div class="k">Tổng nhập kỳ</div><div class="v accent">${fmt(tIn)}</div></div>
    <div class="kpi"><div class="k">Tổng xuất kỳ</div><div class="v danger">${fmt(tOut)}</div></div>
    <div class="kpi"><div class="k">Tồn cuối kỳ</div><div class="v">${fmt(tClose)}</div></div>
  </div>
  <div class="panel"><div class="panel-head"><h3>Nhập Xuất Tồn · ${fmtDate(from)} – ${fmtDate(to)}</h3></div>
  <table><thead><tr><th>Mã</th><th>Tên hàng</th><th>Đơn vị</th><th class="num">Tồn đầu</th><th class="num">Nhập</th><th class="num">Xuất</th><th class="num">Tồn cuối</th></tr></thead>
  <tbody>${rows.length?rows.map(r=>`<tr><td><b>${esc(r.code)}</b></td><td>${esc(r.name)}</td><td>${esc(r.unit)}</td>
    <td class="num">${fmt(r.opening)}</td>
    <td class="num" style="color:var(--accent);font-weight:600">${r.inP?'+'+fmt(r.inP):'—'}</td>
    <td class="num" style="color:var(--danger);font-weight:600">${r.outP?'−'+fmt(r.outP):'—'}</td>
    <td class="num strong">${fmt(r.closing)}</td></tr>`).join(''):`<tr><td colspan="7" class="empty">Không có dữ liệu.</td></tr>`}</tbody></table></div>`;
}
/* Tồn kho hiện tại */
function vStockReport(b){
  const rows=DB.goods.map(g=>({code:g.code,name:g.name,unit:g.unit||'',qty:g.qty,minQty:g.minQty??0})).sort((a,b)=>a.code.localeCompare(b.code));
  const total=rows.reduce((s,r)=>s+r.qty,0);
  const low=rows.filter(r=>r.qty<=r.minQty).length;
  const out=rows.filter(r=>r.qty<=0).length;
  lastReport={name:'ton-kho-hien-tai',cols:['Ma','Ten hang','Don vi','So luong ton','Muc toi thieu'],
    rows:rows.map(r=>[r.code,r.name,r.unit,r.qty,r.minQty])};
  b.innerHTML=`
  <div class="kpis">
    <div class="kpi"><div class="k">Mặt hàng</div><div class="v">${rows.length}</div><div class="d">danh mục</div></div>
    <div class="kpi"><div class="k">Tổng tồn kho</div><div class="v accent">${fmt(total)}</div><div class="d">đơn vị đang có</div></div>
    <div class="kpi"><div class="k">Dưới mức tối thiểu</div><div class="v warn">${low}</div></div>
    <div class="kpi"><div class="k">Hết hàng</div><div class="v danger">${out}</div><div class="d">= 0</div></div>
  </div>
  <div class="panel"><div class="panel-head"><h3>Tồn kho hiện tại</h3>
    <button class="btn btn-ghost" onclick="exportReportCSV()">Xuất CSV</button></div>
    <table><thead><tr><th>Mã hàng</th><th>Tên hàng</th><th>Đơn vị</th><th class="num">Số lượng tồn</th><th class="num">Mức tối thiểu</th><th class="num">Trạng thái</th></tr></thead>
    <tbody>${rows.length?rows.map(r=>`<tr><td><b>${esc(r.code)}</b></td><td>${esc(r.name)}</td><td>${esc(r.unit)}</td>
      <td class="num strong ${r.qty<=r.minQty?'qty-low':''}">${fmt(r.qty)}</td>
      <td class="num">${fmt(r.minQty)}</td>
      <td class="num">${r.qty<=0?'<span class="tag tag-out">Hết hàng</span>':r.qty<=r.minQty?'<span class="tag tag-out">Dưới tối thiểu</span>':'<span class="tag tag-in">Đủ</span>'}</td></tr>`).join(''):'<tr><td colspan="6" class="empty">Chưa có hàng hoá.</td></tr>'}
    </tbody>
    ${rows.length?`<tfoot><tr><td colspan="3" class="strong">Tổng cộng</td><td class="num strong">${fmt(total)}</td><td colspan="2"></td></tr></tfoot>`:''}
    </table>
  </div>`;
}
function exportReportCSV(){
  if(!lastReport.rows.length){ toast('Chưa có dữ liệu'); return; }
  let csv=lastReport.cols.join(',')+'\n';
  lastReport.rows.forEach(r=>{ csv+=r.map(c=>typeof c==='string'&&c.includes(',')?`"${c}"`:`"${c}"`).join(',')+'\n'; });
  csvDownload(lastReport.name+'.csv',csv);
}

    <div class="field"><label>Họ tên</label><input id="u-name" value="${esc(u.name)}"></div>
    <div class="field"><label>Tên đăng nhập</label><input id="u-username" value="${esc(u.username)}"></div>
    <div class="field"><label>Mật khẩu ${id?'(để trống nếu giữ nguyên)':''}</label><input id="u-pass" type="password" placeholder="${id?'••••••':'Nhập mật khẩu'}"></div>
    <div class="field"><label>Vai trò</label><select id="u-role"><option value="staff" ${u.role==='staff'?'selected':''}>Nhân viên</option><option value="admin" ${u.role==='admin'?'selected':''}>Quản trị viên</option></select></div>`,
  async()=>{
    const name=val('u-name'),username=val('u-username').toLowerCase(),role=document.getElementById('u-role').value;
    const pass=document.getElementById('u-pass').value;
    if(!name||!username){ toast('Nhập đủ thông tin'); return false; }
    if(!id&&!pass){ toast('Nhập mật khẩu cho tài khoản mới'); return false; }
    if(DB.users.some(x=>x.username.toLowerCase()===username&&x.id!==id)){ toast('Tên đăng nhập đã tồn tại'); return false; }
    if(id){ Object.assign(u,{name,username,role}); if(pass) u.pw=await hashPw(pass); }
    else DB.users.push({id:uid(),name,username,role,pw:await hashPw(pass)});
    await save(); toast('Đã lưu'); renderTab(); return true;
  });
}
async function delUser(id){
  if(!isAdmin()){ toast('Chỉ quản trị viên mới thao tác được'); return; }
  if(DB.users.filter(u=>u.role==='admin').length<=1&&DB.users.find(u=>u.id===id)?.role==='admin'){ toast('Phải còn ít nhất 1 quản trị viên'); return; }
  if(!confirm('Xoá người dùng này?'))return;
  DB.users=DB.users.filter(x=>x.id!==id); await save(); toast('Đã xoá'); renderTab();
}
function changeOwnPw(){
  modal('Đổi mật khẩu',`
    <div class="field"><label>Mật khẩu hiện tại</label><input id="cp-old" type="password" placeholder="••••••"></div>
    <div class="field"><label>Mật khẩu mới</label><input id="cp-new" type="password" placeholder="Ít nhất 4 ký tự"></div>
    <div class="field"><label>Nhập lại mật khẩu mới</label><input id="cp-new2" type="password" placeholder="••••••"></div>`,
  async()=>{
    const oldp=document.getElementById('cp-old').value,np=document.getElementById('cp-new').value,np2=document.getElementById('cp-new2').value;
    if(CURRENT.pw!==await hashPw(oldp)){ toast('Mật khẩu hiện tại không đúng'); return false; }
    if(np.length<4){ toast('Mật khẩu mới quá ngắn'); return false; }
    if(np!==np2){ toast('Mật khẩu nhập lại không khớp'); return false; }
    CURRENT.pw=await hashPw(np); await save(); toast('Đã đổi mật khẩu'); return true;
  });
}

/* ====== modal ====== */
let modalSubmit=null;
function modal(title,body,onSubmit){
  modalSubmit=onSubmit;
  let o=document.getElementById('overlay');
  if(!o){ o=document.createElement('div'); o.id='overlay'; o.className='overlay'; document.body.appendChild(o); }
  o.innerHTML=`<div class="modal"><div class="modal-head"><h3>${esc(title)}</h3><button class="x" onclick="closeModal()">×</button></div>
    <div class="modal-body">${body}</div>
    <div class="modal-foot"><button class="btn btn-ghost" onclick="closeModal()">Huỷ</button><button class="btn btn-primary" onclick="submitModal()">Lưu</button></div></div>`;
  o.classList.add('show');
}
async function submitModal(){ if(modalSubmit){ const ok=await modalSubmit(); if(ok!==false) closeModal(); } }
function closeModal(){ document.getElementById('overlay')?.classList.remove('show'); }

(async()=>{ await load(); renderGate(); })();
</script>
</body>
