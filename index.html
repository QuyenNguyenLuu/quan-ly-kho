<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quản lý kho hàng</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    /* sidebar xanh rêu đậm (nền thương hiệu) */
    --side:#20353a;--side-2:#182a2e;--side-line:#33484c;
    --side-ink:#e4ecec;--side-muted:#93a4a4;--side-sec:#a7b6b6;
    /* vùng nội dung sáng, hơi ngả kem */
    --bg:#f3f1ea;--panel:#ffffff;--line:#e3ddd0;--line-soft:#efeae0;
    --ink:#3a4a48;--ink-strong:#243b3d;--label:#8a8577;--muted:#9b9587;
    --accent:#2f5d54;--accent-dark:#244a43;--accent-soft:#e5ede9;
    --blue:#2f5d54;
    --good:#2f5d54;--warn:#b98a2e;--warn-soft:#f6edd8;--danger:#b5544a;--danger-soft:#f6e4e1;
    --radius:4px;
    --serif:'Playfair Display',Georgia,serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--ink);line-height:1.55;-webkit-font-smoothing:antialiased}
  button{font-family:inherit;cursor:pointer;border:none;color:inherit}
  input,select{font-family:inherit;font-size:14px;color:var(--ink)}
  ::selection{background:var(--accent);color:#fff}

  .app{display:flex;min-height:100vh}

  /* ===== sidebar ===== */
  aside{width:240px;background:var(--side);position:fixed;height:100vh;display:flex;flex-direction:column;overflow:hidden;z-index:20}
  .brand{padding:18px 18px;border-bottom:1px solid var(--side-line);display:flex;align-items:center;gap:11px}
  .brand .bmark{flex:none}
  .bmark{display:inline-flex;align-items:center;justify-content:center;border-radius:8px;background:transparent;flex:none;overflow:hidden}
  .brand .bn{font-family:var(--serif);font-weight:600;font-size:18px;color:#fff;letter-spacing:.3px;line-height:1.1}
  .brand .bs{font-size:10px;color:var(--side-muted);letter-spacing:1.5px;text-transform:uppercase}
  .profile{padding:20px 18px;border-bottom:1px solid var(--side-line);display:flex;align-items:center;gap:13px}
  .avatar{width:46px;height:46px;border-radius:6px;background:#2f5d54;display:flex;align-items:center;justify-content:center;font-weight:600;color:#fff;font-size:17px;flex:none}
  .profile .pw{font-size:11px;color:var(--side-muted)}
  .profile .pn{font-size:14.5px;color:#fff;font-weight:600}
  nav{padding:14px 0;flex:1;overflow-y:auto}
  .nav-sec{font-size:11px;text-transform:uppercase;letter-spacing:1.4px;color:var(--side-sec);padding:16px 20px 8px;font-weight:700}
  .nav-btn{display:flex;align-items:center;width:100%;text-align:left;background:none;color:var(--side-ink);padding:12px 22px;font-size:14px;font-weight:500;transition:.13s;border-left:3px solid transparent}
  .nav-btn:hover{background:rgba(255,255,255,.05)}
  .nav-btn.on{background:var(--side-2);border-left-color:#7fb8a8;color:#fff;font-weight:600}

  /* ===== top header ===== */
  main{margin-left:240px;flex:1;min-height:100vh;display:flex;flex-direction:column}
  .topbar{height:60px;background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:sticky;top:0;z-index:15}
  .topbar .crumb{font-family:var(--serif);font-size:16px;color:var(--ink-strong)}
  .topbar .crumb b{color:var(--ink-strong);font-weight:600}
  .topbar .uchip{display:flex;align-items:center;gap:10px;font-size:13.5px;color:var(--ink)}
  .topbar .uchip .av{width:32px;height:32px;border-radius:5px;background:#2f5d54;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:600;font-size:13px}
  .topbar .logout{margin-left:8px;font-size:12px;color:var(--muted);background:none;padding:6px 13px;border:1px solid var(--line);border-radius:20px}
  .topbar .logout:hover{color:var(--danger);border-color:var(--danger)}

  .content{position:relative;flex:1;padding:26px 28px 60px;overflow:hidden}

  /* ===== footer (giống coco-cottage.com.vn) ===== */
  .site-footer{background:var(--side);color:var(--side-ink);padding:56px 40px 30px;margin-top:auto}
  .foot-grid{display:grid;grid-template-columns:1.4fr 1.4fr 1fr .8fr;gap:40px;max-width:1200px;margin:0 auto}
  .foot-brand .bmark{background:transparent;border-radius:0;margin-bottom:22px}
  .foot-tag{font-family:var(--serif);font-size:16px;line-height:1.6;color:#c9d4d2;max-width:340px}
  .foot-col h4{font-family:var(--serif);font-size:24px;font-weight:600;color:#fff;margin-bottom:22px;font-weight:500}
  .foot-col p{font-size:14.5px;line-height:1.7;color:#c2cfcd;margin-bottom:14px}
  .foot-col .foot-lbl{color:#8ea09d;font-size:13px;margin-bottom:2px;margin-top:6px}
  .foot-col a{display:block;font-size:14.5px;color:#c2cfcd;margin-bottom:16px;text-decoration:none;cursor:pointer;transition:.13s}
  .foot-col a:hover{color:#fff}
  .foot-base{max-width:1200px;margin:44px auto 0;padding-top:22px;border-top:1px solid var(--side-line);font-size:12.5px;color:#8ea09d;text-align:center;letter-spacing:.3px}
  @media(max-width:880px){ .foot-grid{grid-template-columns:1fr 1fr} }

  .pagehead{margin-bottom:22px}
  .pagehead h2{font-family:var(--serif);font-size:26px;font-weight:600;color:var(--ink-strong);letter-spacing:.2px}
  .pagehead .sub{color:var(--muted);font-size:13px;margin-top:4px}

  /* ===== buttons ===== */
  .btn{padding:9px 18px;border-radius:22px;font-size:13px;font-weight:600;display:inline-flex;align-items:center;gap:7px;transition:.14s;letter-spacing:.4px}
  .btn-primary{background:var(--accent);color:#fff}
  .btn-primary:hover{background:var(--accent-dark)}
  .btn-ghost{background:transparent;color:var(--ink);border:1px solid var(--line)}
  .btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
  .btn-sm{padding:5px 13px;font-size:12px;font-weight:600;border-radius:20px;background:transparent;border:1px solid var(--line);color:var(--ink)}
  .btn-sm:hover{border-color:var(--accent);color:var(--accent)}
  .btn-sm.danger:hover{border-color:var(--danger);color:var(--danger)}

  /* ===== KPI strip ===== */
  .kpis{display:flex;flex-wrap:wrap;background:#fff;border:1px solid var(--line);border-radius:var(--radius);margin-bottom:24px}
  .kpi{flex:1;min-width:160px;padding:18px 22px;border-left:1px solid var(--line)}
  .kpi:first-child{border-left:none}
  .kpi .k{font-size:13px;color:var(--muted);font-weight:500}
  .kpi .v{font-family:var(--serif);font-size:32px;font-weight:600;color:var(--ink-strong);line-height:1.2;margin-top:4px;font-variant-numeric:tabular-nums}
  .kpi .v.accent{color:var(--accent)} .kpi .v.danger{color:var(--danger)} .kpi .v.warn{color:var(--warn)}
  .kpi .d{font-size:12px;margin-top:3px;color:var(--muted)}

  /* ===== panel / table ===== */
  .panel{background:#fff;border:1px solid var(--line);border-radius:var(--radius);margin-bottom:22px}
  .panel-head{padding:15px 20px;border-bottom:1px solid var(--line-soft);display:flex;justify-content:space-between;align-items:center;gap:14px;flex-wrap:wrap}
  .panel-head h3{font-family:var(--serif);font-size:17px;font-weight:600;color:var(--ink-strong)}
  table{width:100%;border-collapse:collapse}
  th{text-align:left;font-size:12px;text-transform:uppercase;letter-spacing:.4px;color:var(--label);font-weight:600;padding:12px 20px;border-bottom:1px solid var(--line)}
  td{padding:13px 20px;border-bottom:1px solid var(--line-soft);font-size:14px;color:var(--ink)}
  tr:last-child td{border-bottom:none}
  tbody tr:hover td{background:#faf8f2}
  td b,td .strong{color:var(--ink-strong);font-weight:600}
  .num{text-align:right;font-variant-numeric:tabular-nums}

  .tag{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600}
  .tag-in{background:var(--accent-soft);color:var(--accent-dark)}
  .tag-out{background:var(--danger-soft);color:var(--danger)}
  .tag-warn{background:var(--warn-soft);color:#96701f}
  .tag-accent{background:var(--accent-soft);color:var(--accent-dark)}
  .tag-muted{background:#efeae0;color:var(--muted)}
  .qty-low{color:var(--danger);font-weight:700}
  .empty{padding:46px;text-align:center;color:var(--muted);font-size:14px}
  .actions{display:flex;gap:8px;justify-content:flex-end}

  /* progress bar */
  .prog{height:7px;background:#eae4d8;border-radius:20px;overflow:hidden;min-width:120px}
  .prog > i{display:block;height:100%;background:var(--accent);border-radius:20px}

  /* ===== forms ===== */
  .form-grid{display:grid;gap:16px;grid-template-columns:repeat(auto-fit,minmax(200px,1fr))}
  .field label{display:block;font-size:12px;font-weight:600;color:var(--label);margin-bottom:6px}
  .field input,.field select{width:100%;padding:9px 12px;border:1px solid var(--line);border-radius:var(--radius);background:#fff;transition:.13s}
  .field input::placeholder{color:#bdb6a5}
  .field input:focus,.field select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  .filter-bar{display:flex;gap:15px;align-items:flex-end;flex-wrap:wrap}
  .filter-bar .field{min-width:160px}
  .search{padding:9px 12px;border:1px solid var(--line);border-radius:var(--radius);background:#fff;min-width:230px}
  .search:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}

  /* ===== modal ===== */
  .overlay{position:fixed;inset:0;background:rgba(42,58,77,.45);display:none;align-items:center;justify-content:center;z-index:60;padding:20px}
  .overlay.show{display:flex}
  .modal{background:#fff;border-radius:6px;width:100%;max-width:480px;box-shadow:0 24px 60px rgba(0,0,0,.25);overflow:hidden}
  .modal-head{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
  .modal-head h3{font-size:16px;font-weight:600;color:var(--ink-strong)}
  .modal-head .x{background:none;font-size:24px;color:var(--muted);line-height:.6;padding:0 4px}
  .modal-head .x:hover{color:var(--ink)}
  .modal-body{padding:22px;display:grid;gap:16px}
  .modal-foot{padding:16px 22px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:11px}

  .toast{position:fixed;bottom:26px;right:26px;background:var(--side);color:#fff;padding:13px 20px;border-radius:var(--radius);font-size:13.5px;font-weight:600;box-shadow:0 12px 36px rgba(0,0,0,.3);transform:translateY(90px);opacity:0;transition:.3s;z-index:90}
  .toast.show{transform:translateY(0);opacity:1}

  /* ===== gate ===== */
  .gate{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:var(--side);position:relative;overflow:hidden}
  .gate-card{position:relative;z-index:1;background:#fff;border-radius:8px;padding:38px 36px;max-width:392px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.3)}
  .gate-card .top{display:flex;align-items:center;gap:12px;padding-bottom:20px;margin-bottom:22px;border-bottom:1px solid var(--line)}
  .gate-logo{display:flex;justify-content:center;margin-bottom:18px}
  .gate-logo .bmark{background:#20353a}
  .gate-title{text-align:center;font-family:var(--serif);font-size:18px;font-weight:600;color:var(--ink-strong);margin-bottom:24px;letter-spacing:.3px}
  .gate-card h1{font-size:20px;font-weight:600;color:var(--ink-strong)}
  .gate-card .lead{color:var(--muted);font-size:13px;margin-top:3px}
  .gate-card .hint{margin-top:16px;font-size:12px;color:var(--muted);text-align:center}
  .loading{padding:80px;text-align:center;color:var(--muted)}

  @media(max-width:880px){
    aside{position:relative;width:100%;height:auto}
    .app{flex-direction:column}
    main{margin-left:0}
    nav{display:grid;grid-template-columns:repeat(2,1fr)}
    .nav-sec{grid-column:1/-1}
    .content{padding:20px 16px}
  }
</style>
</head>

let DB={users:[],goods:[],depts:[],txns:[]};
let CURRENT=null,activeTab='dashboard';

/* hash mật khẩu bằng SHA-256 (không lưu mật khẩu dạng chữ thô) */
async function hashPw(pw){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(pw));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

async function load(){
  let loaded=false;
  try{ const raw=localStorage.getItem('inv-db'); if(raw){ DB=JSON.parse(raw); loaded=true; } }catch(e){}
  if(!loaded){
    DB={
      users:[{id:uid(),name:'Quản trị viên',username:'admin',role:'admin',pw:await hashPw('admin')}],
      goods:[
        {id:uid(),code:'SP001',name:'Gạo ST25 (bao 5kg)',qty:120},
        {id:uid(),code:'SP002',name:'Nước mắm (thùng 12 chai)',qty:34},
        {id:uid(),code:'SP003',name:'Khăn tắm khách sạn',qty:8},
      ],
      depts:[
        {id:uid(),name:'Kho chính',type:'kho'},
        {id:uid(),name:'Nhà hàng',type:'tieu-thu'},
        {id:uid(),name:'Phòng ngủ',type:'tieu-thu'},
      ],
      txns:[]
    };
    await save();
    return;
  }
  // nâng cấp dữ liệu cũ chưa có mật khẩu → đặt mật khẩu = tên đăng nhập
  let changed=false;
  for(const u of DB.users){ if(!u.pw){ u.pw=await hashPw(u.username); changed=true; } }
  if(changed) await save();
}
async function save(){ try{ localStorage.setItem('inv-db',JSON.stringify(DB)); }catch(e){ toast('Không lưu được dữ liệu'); } }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }

function deptName(id){ const d=DB.depts.find(x=>x.id===id); return d?d.name:'—'; }
function goodName(id){ const g=DB.goods.find(x=>x.id===id); return g?g.name:'—'; }
function goodCode(id){ const g=DB.goods.find(x=>x.id===id); return g?g.code:'—'; }
function fmt(n){ return new Intl.NumberFormat('vi-VN').format(n); }
function today(){ return new Date().toISOString().slice(0,10); }
function fmtDate(d){ const [y,m,dd]=d.split('-'); return `${dd}/${m}/${y}`; }
function toast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2200); }
const esc=s=>String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function val(id){ return document.getElementById(id).value.trim(); }
function initials(name){ return name.trim().split(/\s+/).slice(-2).map(w=>w[0]).join('').toUpperCase(); }

/* logo Coco Cottage (ảnh trắng đặt trên nền xanh rêu bo góc) */
function brandMark(size){ const pad=Math.round(size*0.16);
  return `<span class="bmark" style="width:${size}px;height:${size}px;padding:${pad}px"><img src="${LOGO_WHITE}" alt="Coco Cottage" style="width:100%;height:100%;object-fit:contain"></span>`; }

async function doLogin(){
  const u=document.getElementById('lg-user').value.trim().toLowerCase();
  const p=document.getElementById('lg-pass').value;
  const f=DB.users.find(x=>x.username.toLowerCase()===u);
  if(!f){ toast('Không tìm thấy tài khoản'); return; }
  if(f.pw!==await hashPw(p)){ toast('Sai mật khẩu'); return; }
  CURRENT=f; renderApp();
}
function logout(){ CURRENT=null; renderGate(); }
function isAdmin(){ return CURRENT&&CURRENT.role==='admin'; }

    <div class="kpi"><div class="k">Xuất trong tháng</div><div class="v danger">${fmt(outM)}</div><div class="d">tháng ${m.split('-')[1]}</div></div>
    <div class="kpi"><div class="k">Sắp hết hàng</div><div class="v warn">${low.length}</div><div class="d">≤ 10 đơn vị</div></div>
  </div>
  <div class="panel"><div class="panel-head"><h3>Mức tồn theo mặt hàng</h3></div>
    <table><tbody>${DB.goods.map(g=>`<tr><td style="width:30%"><b>${esc(g.code)}</b> &nbsp;${esc(g.name)}</td>
      <td><div class="prog"><i style="width:${Math.round(g.qty/maxQty*100)}%;${g.qty<=10?'background:var(--danger)':''}"></i></div></td>
      <td class="num strong" style="width:90px">${fmt(g.qty)}</td></tr>`).join('')||'<tr><td class="empty">Chưa có hàng hoá.</td></tr>'}</tbody></table>
  </div>
  <div class="panel">
    <div class="panel-head"><h3>Giao dịch gần đây</h3><button class="btn btn-primary btn-sm" onclick="go('inout')">Nhập / Xuất kho</button></div>
    ${recent.length?`<table><thead><tr><th>Ngày</th><th>Loại</th><th>Hàng hoá</th><th>Phòng ban</th><th class="num">Số lượng</th></tr></thead>
    <tbody>${recent.map(t=>rowTx(t,false)).join('')}</tbody></table>`:`<div class="empty">Chưa có giao dịch nào.</div>`}

function rowTx(t,admin){
  return `<tr><td>${fmtDate(t.date)}</td><td><span class="tag ${t.type==='in'?'tag-in':'tag-out'}">${t.type==='in'?'Nhập':'Xuất'}</span></td>

function vInout(v){

    <div style="padding:22px">
      <div class="form-grid">
        <div class="field"><label>Loại giao dịch</label><select id="tx-type" onchange="txTypeChange()"><option value="in">Nhập kho</option><option value="out">Xuất kho</option></select></div>
        <div class="field"><label>Hàng hoá</label><select id="tx-good">${DB.goods.map(g=>`<option value="${g.id}">${esc(g.code)} — ${esc(g.name)} (tồn ${fmt(g.qty)})</option>`).join('')}</select></div>
        <div class="field"><label id="tx-deptlbl">Phòng ban</label><select id="tx-dept">${DB.depts.map(d=>`<option value="${d.id}">${esc(d.name)}</option>`).join('')}</select></div>
        <div class="field"><label>Số lượng</label><input id="tx-qty" type="number" min="1" value="1"></div>
        <div class="field"><label>Ngày</label><input id="tx-date" type="date" value="${today()}"></div>
        <div class="field"><label>Ghi chú</label><input id="tx-note" placeholder="Tuỳ chọn"></div>
      </div>
      <div style="margin-top:20px"><button class="btn btn-primary" onclick="addTxn()">Lưu phiếu</button></div>
    </div>
  </div>
  <div class="panel"><div class="panel-head"><h3>Lịch sử giao dịch · ${DB.txns.length}</h3></div>
    <table><thead><tr><th>Ngày</th><th>Loại</th><th>Hàng hoá</th><th>Phòng ban</th><th class="num">Số lượng</th>${isAdmin()?'<th class="num"></th>':''}</tr></thead>
    <tbody>${DB.txns.length?[...DB.txns].sort((a,b)=>b.date.localeCompare(a.date)||b.id.localeCompare(a.id)).map(t=>rowTx(t,isAdmin())).join(''):`<tr><td colspan="${isAdmin()?6:5}" class="empty">Chưa có giao dịch.</td></tr>`}</tbody></table>
  </div>`;
  txTypeChange();
}
function txTypeChange(){ document.getElementById('tx-deptlbl').textContent=document.getElementById('tx-type').value==='in'?'Nhập vào kho':'Xuất tới phòng ban'; }
async function addTxn(){
  const type=document.getElementById('tx-type').value,goodId=document.getElementById('tx-good').value,deptId=document.getElementById('tx-dept').value;
  const qty=parseInt(document.getElementById('tx-qty').value,10),date=document.getElementById('tx-date').value,note=document.getElementById('tx-note').value.trim();
  if(!goodId||!deptId){ toast('Chọn hàng hoá và phòng ban'); return; }
  if(!qty||qty<1){ toast('Số lượng không hợp lệ'); return; }
  const g=DB.goods.find(x=>x.id===goodId);
  if(type==='out'&&qty>g.qty){ toast('Không đủ tồn kho ('+fmt(g.qty)+')'); return; }
  g.qty+=type==='in'?qty:-qty;
  DB.txns.push({id:uid(),type,goodId,deptId,qty,date,note});
  await save(); toast(type==='in'?'Đã nhập kho':'Đã xuất kho'); renderTab();
}
async function delTxn(id){
  if(!confirm('Xoá giao dịch này? Tồn kho sẽ được hoàn lại.'))return;
  const t=DB.txns.find(x=>x.id===id); if(!t)return;
  const g=DB.goods.find(x=>x.id===t.goodId); if(g) g.qty+=t.type==='in'?-t.qty:t.qty;
  DB.txns=DB.txns.filter(x=>x.id!==id); await save(); toast('Đã xoá'); renderTab();
}

/* ===== báo cáo ===== */
function vReport(v){
  const m=today().slice(0,7);
  v.innerHTML=`
  <div class="pagehead"><h2>Báo cáo nhập – xuất – tồn</h2><div class="sub">Theo tháng hoặc khoảng thời gian tuỳ chọn</div></div>
  <div class="panel"><div class="panel-head"><h3>Bộ lọc</h3></div>
    <div style="padding:20px 22px" class="filter-bar">
      <div class="field"><label>Kiểu lọc</label><select id="rp-mode" onchange="rpModeChange()"><option value="month">Theo tháng</option><option value="range">Khoảng thời gian</option></select></div>
      <div class="field" id="rp-month-wrap"><label>Tháng</label><input id="rp-month" type="month" value="${m}"></div>
      <div class="field" id="rp-from-wrap" style="display:none"><label>Từ ngày</label><input id="rp-from" type="date" value="${m}-01"></div>
      <div class="field" id="rp-to-wrap" style="display:none"><label>Đến ngày</label><input id="rp-to" type="date" value="${today()}"></div>
      <div class="field"><label>Phòng ban</label><select id="rp-dept"><option value="">Tất cả</option>${DB.depts.map(d=>`<option value="${d.id}">${esc(d.name)}</option>`).join('')}</select></div>
      <button class="btn btn-primary" onclick="runReport()">Xem báo cáo</button>
      <button class="btn btn-ghost" onclick="exportCSV()">Xuất CSV</button>
    </div>
  </div>
  <div id="rp-result"></div>`;
  runReport();
}
function rpModeChange(){
  const r=document.getElementById('rp-mode').value==='range';
  document.getElementById('rp-month-wrap').style.display=r?'none':'';
  document.getElementById('rp-from-wrap').style.display=r?'':'none';
  document.getElementById('rp-to-wrap').style.display=r?'':'none';
}
function reportRange(){
  if(document.getElementById('rp-mode').value==='month'){ const m=document.getElementById('rp-month').value; return {from:m+'-01',to:m+'-31',label:'tháng '+m.split('-').reverse().join('/')}; }
  const f=document.getElementById('rp-from').value,t=document.getElementById('rp-to').value;
  return {from:f,to:t,label:`${fmtDate(f)} – ${fmtDate(t)}`};
}
let lastReport={};
function runReport(){
  const {from,to,label}=reportRange(); const deptF=document.getElementById('rp-dept').value;
  const dept=deptF?DB.depts.find(d=>d.id===deptF):null;
  const deptLabel=dept?dept.name:'Tất cả phòng ban';
  // điểm tiêu thụ (nhà hàng, phòng ngủ): hàng chỉ được cấp tới → coi "xuất tới đó" là +nhận
  const consume = dept && dept.type!=='kho';
  let rows=DB.goods.map(g=>{
    const all=DB.txns.filter(t=>t.goodId===g.id && (!deptF||t.deptId===deptF));
    // dòng tiền hàng đối với phòng ban đang xét
    const flow=t=> consume ? (t.type==='out'? t.qty : -t.qty)   // điểm tiêu thụ: nhận = xuất-tới
                           : (t.type==='in' ? t.qty : -t.qty);  // kho / tất cả: nhập +, xuất −
    const sum=arr=>arr.reduce((s,t)=>s+flow(t),0);
    let opening;
    if(deptF){ opening = sum(all.filter(t=>t.date<from)); }
    else { opening = g.qty - sum(all.filter(t=>t.date>=from)); }
    const inArr =all.filter(t=>t.date>=from&&t.date<=to && (consume? t.type==='out' : t.type==='in'));
    const outArr=all.filter(t=>t.date>=from&&t.date<=to && (consume? t.type==='in'  : t.type==='out'));
    const inP=inArr.reduce((s,t)=>s+t.qty,0);
    const outP=outArr.reduce((s,t)=>s+t.qty,0);
    const closing=opening+inP-outP;
    return {code:g.code,name:g.name,opening,inP,outP,closing,hasAny:all.length>0};
  });
  if(deptF) rows=rows.filter(r=>r.hasAny);
  lastReport={rows,label:label+' · '+deptLabel};
  const tIn=rows.reduce((s,r)=>s+r.inP,0),tOut=rows.reduce((s,r)=>s+r.outP,0),tClose=rows.reduce((s,r)=>s+r.closing,0);
  const colIn=consume?'Nhận':'Nhập', colOut=consume?'Trả về':'Xuất';
  const kIn=consume?'Tổng nhận kỳ':'Tổng nhập kỳ', kOut=consume?'Tổng trả về kỳ':'Tổng xuất kỳ', kClose=consume?'Đang giữ cuối kỳ':'Tồn cuối kỳ';
  document.getElementById('rp-result').innerHTML=`
  <div class="kpis">
    <div class="kpi"><div class="k">${kIn}</div><div class="v accent">${fmt(tIn)}</div></div>
    <div class="kpi"><div class="k">${kOut}</div><div class="v danger">${fmt(tOut)}</div></div>
    <div class="kpi"><div class="k">${kClose}</div><div class="v">${fmt(tClose)}</div></div>
  </div>
  <div class="panel"><div class="panel-head"><h3>Báo cáo nhập – xuất – tồn · ${esc(label)}${deptF?' · '+esc(deptLabel):''}</h3></div>
  <table><thead><tr><th>Mã</th><th>Tên hàng</th><th class="num">${consume?'Đầu kỳ':'Tồn đầu'}</th><th class="num">${colIn}</th><th class="num">${colOut}</th><th class="num">${consume?'Cuối kỳ':'Tồn cuối'}</th></tr></thead>
  <tbody>${rows.length?rows.map(r=>`<tr><td><b>${esc(r.code)}</b></td><td>${esc(r.name)}</td>
    <td class="num">${fmt(r.opening)}</td>
    <td class="num" style="color:var(--accent);font-weight:600">${r.inP?'+'+fmt(r.inP):'—'}</td>
    <td class="num" style="color:var(--danger);font-weight:600">${r.outP?'−'+fmt(r.outP):'—'}</td>
    <td class="num strong">${fmt(r.closing)}</td></tr>`).join(''):`<tr><td colspan="6" class="empty">Không có giao dịch nào cho phòng ban này trong kỳ.</td></tr>`}</tbody></table></div>`;
}
function exportCSV(){
  if(!lastReport.rows){ toast('Chưa có dữ liệu'); return; }
  let csv='Ma,Ten hang,Ton dau,Nhap,Xuat,Ton cuoi\n';
  lastReport.rows.forEach(r=>csv+=`${r.code},"${r.name}",${r.opening},${r.inP},${r.outP},${r.closing}\n`);
  const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'}),a=document.createElement('a');
  a.href=URL.createObjectURL(blob); a.download=`bao-cao-${lastReport.label.replace(/[^0-9]/g,'-')}.csv`; a.click(); toast('Đã xuất CSV');
}

  <div class="panel"><div class="panel-head"><h3>${DB.goods.length} mặt hàng</h3>${isAdmin()?`<button class="btn btn-primary" onclick="goodForm()">Thêm hàng hoá</button>`:''}</div>
  <table><thead><tr><th>Mã hàng</th><th>Tên hàng</th><th class="num">Số lượng</th>${isAdmin()?'<th class="num">Thao tác</th>':''}</tr></thead>
  <tbody>${DB.goods.map(g=>`<tr><td><b>${esc(g.code)}</b></td><td>${esc(g.name)}</td><td class="num strong">${fmt(g.qty)}</td>
    ${isAdmin()?`<td class="num"><div class="actions"><button class="btn-sm" onclick="goodForm('${g.id}')">Sửa</button><button class="btn-sm danger" onclick="delGood('${g.id}')">Xoá</button></div></td>`:''}</tr>`).join('')||`<tr><td colspan="4" class="empty">Chưa có hàng hoá.</td></tr>`}</tbody></table></div>`;
}
function goodForm(id){
  const g=id?DB.goods.find(x=>x.id===id):{code:'',name:'',qty:0};
  modal(id?'Sửa hàng hoá':'Thêm hàng hoá',`
    <div class="field"><label>Mã hàng</label><input id="g-code" value="${esc(g.code)}" placeholder="VD: SP004"></div>
    <div class="field"><label>Tên hàng</label><input id="g-name" value="${esc(g.name)}" placeholder="Tên mặt hàng"></div>
    <div class="field"><label>Số lượng ${id?'tồn':'ban đầu'}</label><input id="g-qty" type="number" min="0" value="${g.qty}"></div>`,
  async()=>{
    const code=val('g-code'),name=val('g-name'),qty=parseInt(document.getElementById('g-qty').value,10)||0;
    if(!code||!name){ toast('Nhập đủ mã và tên'); return false; }
    if(DB.goods.some(x=>x.code.toLowerCase()===code.toLowerCase()&&x.id!==id)){ toast('Mã hàng đã tồn tại'); return false; }
    if(id) Object.assign(g,{code,name,qty}); else DB.goods.push({id:uid(),code,name,qty});
    await save(); toast('Đã lưu'); renderTab(); return true;
  });
}
async function delGood(id){
  if(DB.txns.some(t=>t.goodId===id)){ if(!confirm('Mặt hàng có giao dịch liên quan. Vẫn xoá?'))return; }
  else if(!confirm('Xoá mặt hàng này?'))return;
  DB.goods=DB.goods.filter(x=>x.id!==id); await save(); toast('Đã xoá'); renderTab();
}

/* ===== phòng ban ===== */
function vDepts(v){
  v.innerHTML=`
  <div class="pagehead"><h2>Phòng ban</h2><div class="sub">Kho chính · nhà hàng · phòng ngủ</div></div>
  <div class="panel"><div class="panel-head"><h3>${DB.depts.length} phòng ban</h3>${isAdmin()?`<button class="btn btn-primary" onclick="deptForm()">Thêm phòng ban</button>`:''}</div>
  <table><thead><tr><th>Tên phòng ban</th><th>Loại</th>${isAdmin()?'<th class="num">Thao tác</th>':''}</tr></thead>
  <tbody>${DB.depts.map(d=>`<tr><td><b>${esc(d.name)}</b></td><td><span class="tag ${d.type==='kho'?'tag-accent':'tag-muted'}">${d.type==='kho'?'Kho hàng':'Điểm tiêu thụ'}</span></td>
    ${isAdmin()?`<td class="num"><div class="actions"><button class="btn-sm" onclick="deptForm('${d.id}')">Sửa</button><button class="btn-sm danger" onclick="delDept('${d.id}')">Xoá</button></div></td>`:''}</tr>`).join('')||`<tr><td colspan="3" class="empty">Chưa có phòng ban.</td></tr>`}</tbody></table></div>`;
}
function deptForm(id){
  const d=id?DB.depts.find(x=>x.id===id):{name:'',type:'tieu-thu'};
  modal(id?'Sửa phòng ban':'Thêm phòng ban',`
    <div class="field"><label>Tên phòng ban</label><input id="d-name" value="${esc(d.name)}" placeholder="VD: Nhà hàng"></div>
    <div class="field"><label>Loại</label><select id="d-type"><option value="kho" ${d.type==='kho'?'selected':''}>Kho hàng</option><option value="tieu-thu" ${d.type==='tieu-thu'?'selected':''}>Điểm tiêu thụ</option></select></div>`,
  async()=>{
    const name=val('d-name'),type=document.getElementById('d-type').value;
    if(!name){ toast('Nhập tên phòng ban'); return false; }
    if(id) Object.assign(d,{name,type}); else DB.depts.push({id:uid(),name,type});
    await save(); toast('Đã lưu'); renderTab(); return true;
  });
}
async function delDept(id){
  if(DB.txns.some(t=>t.deptId===id)){ toast('Phòng ban đang có giao dịch, không thể xoá'); return; }
  if(!confirm('Xoá phòng ban này?'))return;
  DB.depts=DB.depts.filter(x=>x.id!==id); await save(); toast('Đã xoá'); renderTab();
}

/* ===== người dùng ===== */
function vUsers(v){
  v.innerHTML=`
  <div class="pagehead"><h2>Người dùng</h2><div class="sub">Quản trị viên có thể thêm, sửa, xoá tài khoản</div></div>
  <div class="panel"><div class="panel-head"><h3>${DB.users.length} tài khoản</h3><button class="btn btn-primary" onclick="userForm()">Thêm người dùng</button></div>
  <table><thead><tr><th>Họ tên</th><th>Tên đăng nhập</th><th>Vai trò</th><th class="num">Thao tác</th></tr></thead>
  <tbody>${DB.users.map(u=>`<tr><td><b>${esc(u.name)}</b></td><td>${esc(u.username)}</td>
    <td><span class="tag ${u.role==='admin'?'tag-accent':'tag-muted'}">${u.role==='admin'?'Quản trị viên':'Nhân viên'}</span></td>
    <td class="num"><div class="actions"><button class="btn-sm" onclick="userForm('${u.id}')">Sửa</button>${u.id!==CURRENT.id?`<button class="btn-sm danger" onclick="delUser('${u.id}')">Xoá</button>`:''}</div></td></tr>`).join('')}</tbody></table></div>`;
}
function userForm(id){
  const u=id?DB.users.find(x=>x.id===id):{name:'',username:'',role:'staff'};
  modal(id?'Sửa người dùng':'Thêm người dùng',`
    <div class="field"><label>Họ tên</label><input id="u-name" value="${esc(u.name)}"></div>
    <div class="field"><label>Tên đăng nhập</label><input id="u-username" value="${esc(u.username)}"></div>
    <div class="field"><label>Mật khẩu ${id?'(để trống nếu giữ nguyên)':''}</label><input id="u-pass" type="password" placeholder="${id?'••••••':'Nhập mật khẩu'}"></div>
    <div class="field"><label>Vai trò</label><select id="u-role"><option value="staff" ${u.role==='staff'?'selected':''}>Nhân viên</option><option value="admin" ${u.role==='admin'?'selected':''}>Quản trị viên</option></select></div>`,
  async()=>{
    const name=val('u-name'),username=val('u-username').toLowerCase(),role=document.getElementById('u-role').value;
    const pass=document.getElementById('u-pass').value;
    if(!name||!username){ toast('Nhập đủ thông tin'); return false; }
    if(!id&&!pass){ toast('Nhập mật khẩu cho tài khoản mới'); return false; }
    if(DB.users.some(x=>x.username.toLowerCase()===username&&x.id!==id)){ toast('Tên đăng nhập đã tồn tại'); return false; }
    if(id){ Object.assign(u,{name,username,role}); if(pass) u.pw=await hashPw(pass); }
    else DB.users.push({id:uid(),name,username,role,pw:await hashPw(pass)});
    await save(); toast('Đã lưu'); renderTab(); return true;
  });
}
async function delUser(id){
  if(DB.users.filter(u=>u.role==='admin').length<=1&&DB.users.find(u=>u.id===id)?.role==='admin'){ toast('Phải còn ít nhất 1 quản trị viên'); return; }
  if(!confirm('Xoá người dùng này?'))return;
  DB.users=DB.users.filter(x=>x.id!==id); await save(); toast('Đã xoá'); renderTab();
}
/* đổi mật khẩu của chính tài khoản đang đăng nhập */
function changeOwnPw(){
  modal('Đổi mật khẩu',`
    <div class="field"><label>Mật khẩu hiện tại</label><input id="cp-old" type="password" placeholder="••••••"></div>
    <div class="field"><label>Mật khẩu mới</label><input id="cp-new" type="password" placeholder="Ít nhất 4 ký tự"></div>
    <div class="field"><label>Nhập lại mật khẩu mới</label><input id="cp-new2" type="password" placeholder="••••••"></div>`,
  async()=>{
    const oldp=document.getElementById('cp-old').value,np=document.getElementById('cp-new').value,np2=document.getElementById('cp-new2').value;
    if(CURRENT.pw!==await hashPw(oldp)){ toast('Mật khẩu hiện tại không đúng'); return false; }
    if(np.length<4){ toast('Mật khẩu mới quá ngắn'); return false; }
    if(np!==np2){ toast('Mật khẩu nhập lại không khớp'); return false; }
    CURRENT.pw=await hashPw(np); await save(); toast('Đã đổi mật khẩu'); return true;
  });
}

/* ===== modal ===== */
let modalSubmit=null;
function modal(title,body,onSubmit){
  modalSubmit=onSubmit;
  let o=document.getElementById('overlay');
  if(!o){ o=document.createElement('div'); o.id='overlay'; o.className='overlay'; document.body.appendChild(o); }
  o.innerHTML=`<div class="modal"><div class="modal-head"><h3>${esc(title)}</h3><button class="x" onclick="closeModal()">×</button></div>
    <div class="modal-body">${body}</div>
    <div class="modal-foot"><button class="btn btn-ghost" onclick="closeModal()">Huỷ</button><button class="btn btn-primary" onclick="submitModal()">Lưu</button></div></div>`;
  o.classList.add('show');
}
async function submitModal(){ if(modalSubmit){ const ok=await modalSubmit(); if(ok!==false) closeModal(); } }
function closeModal(){ document.getElementById('overlay')?.classList.remove('show'); }

(async()=>{ await load(); renderGate(); })();
</script>
</body>
